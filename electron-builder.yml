appId: com.dlroqa.lanchat
productName: LanChat
copyright: Copyright © 2026 dlroqa

directories:
  output: release
  buildResources: build

files:
  - src/main/**        # includes src/main/assets/* (tray icons)
  - src/preload/**
  - dist/renderer/**
  - package.json

# build/icon.png is generated by `npm run icons`.
icon: build/icon.png

# WebRTC needs the built renderer; ensure it exists before packaging (npm run dist does this).
asar: true

# Ad-hoc signs the macOS bundle so Apple Silicon will launch it (see the script).
afterPack: build/afterPack.js

mac:
  category: public.app-category.social-networking
  # Build for both Apple Silicon and Intel Macs.
  target:
    - target: dmg
      arch: [arm64, x64]
    # The ZIP names are deliberately left at the default: the in-app updater in
    # already-released builds matches "-arm64-mac.zip" / "-mac.zip", and renaming
    # them would break updating for every existing user.
    - target: zip
      arch: [arm64, x64]
  # electron-builder skips its own signing; build/afterPack.js ad-hoc signs instead.
  identity: null
  # REQUIRED for calls. macOS refuses microphone/camera access to an app whose
  # Info.plist has no usage description, which surfaces as a connected call with
  # silence rather than an obvious permission error. electron-builder does not
  # add these automatically.
  extendInfo:
    NSMicrophoneUsageDescription: LanChat uses your microphone for voice and video calls with people on your network.
    NSCameraUsageDescription: LanChat uses your camera for video calls with people on your network.
    NSLocalNetworkUsageDescription: LanChat finds and connects to people on your local network and Tailscale mesh.

# electron-builder suffixes arm64 but leaves x64 unlabelled, so the Intel DMG
# looked like "the generic one" and was easy to miss. Scoped to dmg so the ZIP
# names the updater depends on are untouched.
dmg:
  artifactName: ${productName}-${version}-${arch}.${ext}

win:
  target:
    - nsis
    - portable

nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  perMachine: false

linux:
  category: Network
  target:
    - AppImage
    - deb
